<!DOCTYPE html>
<html>
<head>
    <title>Tandurust – Smart Triage</title>
    <style>
        body { font-family: Arial; }
        .critical { color: red; font-weight: bold; }
        .urgent { color: orange; font-weight: bold; }
        .normal { color: green; }
    </style>
</head>
<body>

<h2>ER Triage – Patient Intake</h2>

<form id="triageForm">
    <input type="text" id="name" placeholder="Patient Name" required><br><br>

    <input type="number" id="age" placeholder="Age" required><br><br>

    Main Problem:
    <select id="problem">
        <option value="Chest Pain">Chest Pain</option>
        <option value="Shortness of Breath">Shortness of Breath</option>
        <option value="Trauma / Bleeding">Trauma / Bleeding</option>
        <option value="Severe Pain">Severe Pain</option>
        <option value="Unconscious">Unconscious</option>
    </select><br><br>

    SpO₂ (%) <input type="number" id="spo2" required><br><br>
    Pain (0–10) <input type="number" id="pain" required><br><br>

    <button type="submit">Add Patient</button>
</form>

<hr>

<h3>Patient Queue (Auto-Prioritized)</h3>
<ul id="queue"></ul>

<script>
let patients = [];

document.getElementById("triageForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const name = document.getElementById("name").value;
    const problem = document.getElementById("problem").value;

    // Map problem → checkboxes logically
    const chest = problem === "Chest Pain" ? 1 : 0;
    const sob = problem === "Shortness of Breath" ? 1 : 0;
    const trauma = problem === "Trauma / Bleeding" ? 1 : 0;
    const unconscious = problem === "Unconscious" ? 1 : 0;

    // Minimal feature vector (model-compatible)
    const features = [
        Number(age.value),
        120, 80, 98.6,
        1,
        chest,
        80,
        Number(spo2.value),
        sob,
        0,
        110,
        18,
        Number(pain.value) * 10,
        unconscious,
        trauma,
        trauma
    ];

    const response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ features })
    });

    const result = await response.json();

    patients.push({
        name,
        problem,
        esi: result.esi_level,
        label: result.triage_label
    });

    // Sort by urgency (ESI 1 first)
    patients.sort((a, b) => a.esi - b.esi);

    renderQueue();
    triageForm.reset();
});

function renderQueue() {
    const ul = document.getElementById("queue");
    ul.innerHTML = "";

    patients.forEach(p => {
        let cls = "normal";
        if (p.esi <= 2) cls = "critical";
        else if (p.esi === 3) cls = "urgent";

        ul.innerHTML += `
            <li class="${cls}">
                <strong>${p.name}</strong> – ${p.problem} –
                ${p.label} (ESI ${p.esi})
            </li>
        `;
    });
}
</script>

</body>
</html>
