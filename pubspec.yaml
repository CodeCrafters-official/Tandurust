name: tandurust
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  easy_localization: ^3.0.5
  shared_preferences: ^2.0.15
  path_provider: ^2.0.9
  url_launcher: ^6.0.17
  http: ^1.2.0
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  encrypt: ^5.0.1




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"


flutter:
  uses-material-design: true
  assets:
    - assets/langs/
    - assets/logo.png
    - assets/mock_map.png
    - assets/chennai_map.png